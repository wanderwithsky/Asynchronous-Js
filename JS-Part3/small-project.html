<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card UI</title>
    <link rel="stylesheet" href="small-project.css" />
</head>

<body>

    <!-- Form -->
    <div class="container">
        <div class="form-card">
            <form>
                <h2>Add User</h2>
                <input type="text" placeholder="Name" id="name" />
                <input type="text" placeholder="Role" id="role" />
                <textarea placeholder="Bio" id="bio"></textarea>
                <input type="text" placeholder="Photo URL" id="photo" />
                <button id="submit">Submit</button>
            </form>
        </div>
    </div>

    <!-- Cards -->
    <div class="card-container" id="cardContainer">

       
    </div>
    <script src="small-project.js"></script>
</body>

</html>
