<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download Simulator</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <h2>Downloading File</h2>

    <div class="progress-box">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p id="percent">0%</p>
    <p id="status">Waiting to start...</p>

    <button id="startBtn" style="margin: 5px;">Download</button>
    <button id="stopBtn">Pause</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
