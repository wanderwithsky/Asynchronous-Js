<!DOCTYPE html>
<html>

<head>
    <title>Keyboard Event</title>
    <style>
        body {
            background-color: #000;
            display: f;
        }

        input {
            display: flex;
            margin: 10px;
        }

        #btn {
            background-color: rgb(5, 70, 20);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #btn:hover {
            background-color: rgb(7, 50, 14);
        }

        .card {
            min-width: 200px;
            max-width: 300px;
            color: #fff;
            margin-top: 40px;
            border-radius: 10px;
            display: inline-block;
            padding: 20px;
            border: 1px solid #555;
            margin: 10px;
        }

        .profile {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            overflow: hidden;
        }

        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h3,
        h5,
        p {
            margin: 5px;
        }

        .card h3{
            font-size: 25px;
        }
        .card h5{
            font-size: 18px;
        }
        .card p{
            font-size: 12px;
            margin-top: 10px;
        }
        
    </style>
</head>

<body>

    <div id="main">
        <form action="">
            <input type="text" placeholder="profile pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
    </div>
